apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gitops-app-alerts
  namespace: default
  labels:
    release: monitoring
spec:
  groups:
    - name: gitops-app.rules
      rules:
        - alert: HighCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="default"}[1m])) > 0.5
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage detected"
            description: "CPU usage exceeded 0.5 cores for over 1 minute"

        - alert: PodNotRunning
          expr: kube_pod_status_phase{namespace="default", phase!="Running"} == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod is not running"
            description: "A pod has been in non-running state for over 1 minute"

        - alert: HighMemoryUsage
          expr: sum(container_memory_working_set_bytes{namespace="default"}) > 500000000
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage detected"
            description: "Memory usage exceeded 500MB in default namespace"
