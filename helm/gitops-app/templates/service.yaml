apiVersion: v1
kind: Service
metadata:
  name: {{ include "gitops-app.fullname" . }}
  labels:
    {{- include "gitops-app.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      nodePort: 30008
      name: http
  selector:
    {{- include "gitops-app.selectorLabels" . | nindent 4 }}